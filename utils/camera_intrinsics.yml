# Camera Matrix (3x3)
# [407.0646, 0, 384.5]
# [0, 407.0646, 246.5]
# [0, 0, 1]
camera_matrix: !!opencv-matrix
   rows: 3
   cols: 3
   dt: d
   data: [ 407.0646129842357, 0.0, 384.5, 
           0.0, 407.0646129842357, 246.5, 
           0.0, 0.0, 1.0 ]

# Distortion Coefficients (5x1)
# Gazebo plumb_bob model with all zeros
